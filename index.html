<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KANE FASHION</title>

<style>
:root{
--gold:#C9A227;
}

body{
margin:0;
font-family:Poppins,Arial;
background:#f8f8f8;
}

/* HEADER */
header{
position:sticky;
top:0;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
z-index:1000;
border-bottom:1px solid #ddd;
}

.logo img{height:40px}

/* MENU MOBILE */
.menu-btn{
font-size:25px;
cursor:pointer;
display:none;
}

nav{
display:flex;
gap:15px;
}

nav a{
text-decoration:none;
color:#000;
font-weight:500;
}

@media(max-width:768px){
nav{
position:fixed;
top:0;
right:-100%;
width:70%;
height:100%;
background:#fff;
flex-direction:column;
padding:30px;
transition:0.4s;
}
nav.active{right:0;}
.menu-btn{display:block;}
}

/* SEARCH */
.search{
padding:8px;
border-radius:20px;
border:1px solid #ccc;
}

/* GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:25px;
padding:20px;
}

.card{
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.4s;
}

.card:hover{transform:translateY(-8px)}

.img-box{
height:230px;
overflow:hidden;
cursor:pointer;
}

.img-box img{
width:100%;
height:100%;
object-fit:cover;
transition:0.5s;
}

.img-box:hover img{
transform:scale(1.2);
filter:brightness(0.7);
}

/* PANIER BOUTON */
.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:var(--gold);
color:white;
padding:15px;
border-radius:50%;
font-size:20px;
cursor:pointer;
}

/* PANIER */
.cart{
position:fixed;
bottom:80px;
right:20px;
background:#fff;
width:280px;
padding:15px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
display:none;
}

.cart.active{display:block;}

.cart-item{
display:flex;
justify-content:space-between;
margin:5px 0;
}

/* MODAL PRODUIT */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:#fff;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

/* CONTACT */
.contact{
text-align:center;
padding:20px;
font-size:18px;
}

.contact span{
background:#000;
color:#fff;
padding:10px 15px;
border-radius:30px;
}

/* BUTTON */
button{
background:var(--gold);
border:none;
padding:6px 10px;
color:white;
cursor:pointer;
border-radius:5px;
}
</style>
</head>

/* RENDER */
function render(){
let html="";
filtered.forEach(p=>{
html+=`
<div class="card">
<div class="img-box" onclick="showProduct('${p.name}')">
<img src="${p.img}">
</div>
<h3>${p.name}</h3>
<p>${p.price} FCFA</p>
<button onclick="add('${p.name}',${p.price})">Ajouter</button>
</div>`;
});
products.innerHTML=html;
}
render();

/* DETAIL */
function showProduct(name){
let p=PRODUCTS.find(x=>x.name===name);
modal.style.display="flex";
modal-content.innerHTML=`
<h2>${p.name}</h2>
<img src="${p.img}" style="width:100%">
<p>${p.desc}</p>
<p>${p.price} FCFA</p>
<button onclick="add('${p.name}',${p.price})">Ajouter</button>
`;
}

modal.onclick=()=>modal.style.display="none";

/* SEARCH */
function search(q){
q=q.toLowerCase();
filtered=PRODUCTS.filter(p=>p.name.toLowerCase().includes(q));
render();
}

/* MENU */
function toggleMenu(){
menu.classList.toggle("active");
}

/* PANIER */
let cart=[];

function add(name,price){
let item=cart.find(i=>i.name===name);
if(item){item.qty++}
else{cart.push({name,price,qty:1})}
update();
}

function update(){
let html="";
let total=0;

cart.forEach((i,index)=>{
total+=i.price*i.qty;
html+=`
<div class="cart-item">
${i.name} x${i.qty}
<button onclick="removeItem(${index})">вқҢ</button>
</div>`;
});

cart-items.innerHTML=html;
total.innerText=total;
count.innerText=cart.length;
}

function removeItem(i){
cart.splice(i,1);
update();
}

function toggleCart(){
cart.classList.toggle("active");
}

/* WHATSAPP */
function order(){
let msg="Commande:%0A";
cart.forEach(i=>msg+=i.name+" x"+i.qty+"%0A");
window.open(`https://wa.me/${PHONE}?text=${msg}`);
}
