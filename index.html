<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KANE FASHION</title>

<style>
:root{
--gold1:#C9A227;
--gold2:#E6BF52;
--white:#ffffff;
--light:#f8f8f8;
--card:#ffffff;
--text:#111;
}

body{
margin:0;
font-family:Arial;
background:var(--light);
color:var(--text);
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#fff;
border-bottom:1px solid #ddd;
}

<div class="logo">
<img src="https://www.image2url.com/r2/default/images/1776857636247-0a2140dc-2feb-402e-a1e8-8b2294630ffb.png" 
alt="KANE FASHION">
</div>

/* FILTER */
.filter{
text-align:center;
margin:10px;
}

.filter button{
padding:8px 15px;
margin:5px;
border:none;
background:#eee;
color:#000;
border-radius:6px;
}

/* GRID */
.products{display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
padding:20px;}

.card{background:var(--card);
padding:15px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
transition:0.3s;}
.card:hover{transform:translateY(-8px)}
  
  .logo img{
height:50px;
filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));}

/* IMAGE HOVER */
.img-box{
position:relative;
height:200px;
overflow:hidden;}
.img-box img{position:absolute;
width:100%;
height:100%;
object-fit:cover;
border-radius:10px;
transition:0.5s;}
.img-box img:last-child{opacity:0;}
.img-box:hover img:first-child{opacity:0;}
.img-box:hover img:last-child{opacity:1;}

/* PANIER FLOTTANT */
.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:linear-gradient(90deg,var(--gold1),var(--gold2));
color:white;
padding:15px;
border-radius:50%;
font-size:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.cart{
position:fixed;
right:20px;
bottom:90px;
background:white;
padding:15px;
width:300px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
display:none;
}

.cart.active{display:block;}

.cart-item{
display:flex;
justify-content:space-between;
margin:5px 0;
}

/* DASHBOARD */
#ordersPanel{
position:fixed;
top:10%;
left:50%;
transform:translateX(-50%);
background:white;
padding:20px;
width:90%;
max-width:400px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
display:none;
}

button{
cursor:pointer;
border:none;
padding:6px 10px;
border-radius:5px;
background:var(--gold1);
color:white;
margin-top:5px;
}

</style>
</head>

<body>

<header>
<div class="logo">KANE FASHION</div>
<button onclick="showOrders()">📊</button>
</header>

<div class="filter">
<button onclick="filter('all')">Tous</button>
<button onclick="filter('parfum')">Parfums</button>
<button onclick="filter('sac')">Sacs</button>
</div>

<section class="products" id="products"></section>

<!-- PANIER -->
<div class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div class="cart" id="cart">
<h3>Panier</h3>
<div id="cart-items"></div>
<p>Total: <span id="total">0</span> FCFA</p>
<button onclick="saveOrder()">Commander</button>
</div>

<!-- COMMANDES -->
<div id="ordersPanel">
<h3>Commandes</h3>
<div id="ordersList"></div>
<button onclick="clearOrders()">Supprimer</button>
<button onclick="closeOrders()">Fermer</button>
</div>

<script>

/* PRODUITS */
const PRODUCTS = [
{name:"KANE SOFT",price:10000,cat:"parfum",img1:"https://postimg.cc/qgBGVdFY",img2:"https://images.unsplash.com/photo-1615634260167-c8cdede054de"},
{name:"KANE FRESH",price:12000,cat:"parfum",img1:"https://images.unsplash.com/photo-1598033129183-c4f50c736f10",img2:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519"},
{name:"KANE FLORAL",price:15000,cat:"parfum",img1:"https://images.unsplash.com/photo-1583316174775-bd6dc0e9f298",img2:"https://images.unsplash.com/photo-1596462502278-27bfdc403348"},
{name:"KANE INTENSE",price:18000,cat:"parfum",img1:"https://images.unsplash.com/photo-1615634260167-c8cdede054de",img2:"https://images.unsplash.com/photo-1585386959984-a41552231658"},
{name:"KANE NUIT",price:20000,cat:"parfum",img1:"https://images.unsplash.com/photo-1598033129183-c4f50c736f10",img2:"https://images.unsplash.com/photo-1583316174775-bd6dc0e9f298"},
{name:"KANE GOLD",price:22000,cat:"parfum",img1:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519",img2:"https://images.unsplash.com/photo-1596462502278-27bfdc403348"},
{name:"KANE LUXE",price:25000,cat:"parfum",img1:"https://images.unsplash.com/photo-1585386959984-a41552231658",img2:"https://images.unsplash.com/photo-1615634260167-c8cdede054de"},
{name:"KANE ROYAL",price:28000,cat:"parfum",img1:"https://images.unsplash.com/photo-1598033129183-c4f50c736f10",img2:"https://images.unsplash.com/photo-1583316174775-bd6dc0e9f298"},
{name:"KANE PRESTIGE",price:30000,cat:"parfum",img1:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519",img2:"https://images.unsplash.com/photo-1596462502278-27bfdc403348"},

{name:"SAC CUIR NOIR",price:15000,cat:"sac",img1:"https://images.unsplash.com/photo-1596462502278-27bfdc403348",img2:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519"},
{name:"SAC CUIR MARRON",price:18000,cat:"sac",img1:"https://images.unsplash.com/photo-1583316174775-bd6dc0e9f298",img2:"https://images.unsplash.com/photo-1615634260167-c8cdede054de"},
{name:"SAC CUIR LUXE",price:20000,cat:"sac",img1:"https://images.unsplash.com/photo-1598033129183-c4f50c736f10",img2:"https://images.unsplash.com/photo-1585386959984-a41552231658"},
{name:"SAC MAIN ELEGANT",price:22000,cat:"sac",img1:"https://images.unsplash.com/photo-1585386959984-a41552231658",img2:"https://images.unsplash.com/photo-1598033129183-c4f50c736f10"},
{name:"SAC CUIR SIMPLE",price:25000,cat:"sac",img1:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519",img2:"https://images.unsplash.com/photo-1583316174775-bd6dc0e9f298"},
{name:"SAC MODERNE",price:27000,cat:"sac",img1:"https://images.unsplash.com/photo-1596462502278-27bfdc403348",img2:"https://images.unsplash.com/photo-1615634260167-c8cdede054de"},
{name:"SAC FASHION",price:28000,cat:"sac",img1:"https://images.unsplash.com/photo-1583316174775-bd6dc0e9f298",img2:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519"},
{name:"SAC CHIC",price:29000,cat:"sac",img1:"https://images.unsplash.com/photo-1598033129183-c4f50c736f10",img2:"https://images.unsplash.com/photo-1585386959984-a41552231658"}
];

/* RENDER + CART + COMMANDES (identique) */
function render(list){
let html="";
list.forEach(p=>{
html+=`
<div class="card">
<div class="img-box">
<img src="${p.img1}">
<img src="${p.img2}">
</div>
<h3>${p.name}</h3>
<p>${p.price} FCFA</p>
<button onclick="add('${p.name}',${p.price})">Ajouter</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}
render(PRODUCTS);

function filter(cat){
if(cat==="all") render(PRODUCTS);
else render(PRODUCTS.filter(p=>p.cat===cat));
}

let cart=[];

function add(name,price){
let item=cart.find(i=>i.name===name);
if(item){item.qty++}
else{cart.push({name,price,qty:1})}
update();
}

function update(){
let html="";
let total=0;

cart.forEach((i,index)=>{
total+=i.price*i.qty;
html+=`
<div class="cart-item">
${i.name} x${i.qty}
<div>
<button onclick="change(${index},-1)">-</button>
<button onclick="change(${index},1)">+</button>
</div>
</div>`;
});

document.getElementById("cart-items").innerHTML=html;
document.getElementById("total").textContent=total;
document.getElementById("count").textContent=cart.length;
}

function change(i,d){
cart[i].qty+=d;
if(cart[i].qty<=0) cart.splice(i,1);
update();
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function saveOrder(){
let orders=JSON.parse(localStorage.getItem("orders"))||[];
orders.push({date:new Date().toLocaleString(),items:cart});
localStorage.setItem("orders",JSON.stringify(orders));
alert("Commande enregistrée !");
cart=[];
update();
}

function showOrders(){
let orders=JSON.parse(localStorage.getItem("orders"))||[];
let html="";
orders.forEach((o,i)=>{
html+=`<div><b>Commande ${i+1}</b><br>${o.date}<br>`;
o.items.forEach(it=>{html+=it.name+" x"+it.qty+"<br>";});
html+="</div><hr>";
});
document.getElementById("ordersList").innerHTML=html||"Aucune commande";
document.getElementById("ordersPanel").style.display="block";
}

function closeOrders(){document.getElementById("ordersPanel").style.display="none";}
function clearOrders(){localStorage.removeItem("orders");showOrders();}

</script>

</body>
</html>
