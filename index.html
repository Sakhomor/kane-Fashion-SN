<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KANE FASHION</title>

<style>
body{
margin:0;
font-family:Arial;
background:#fff;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-between;
padding:15px;
border-bottom:1px solid #ddd;
z-index:1000;
}

/* GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:100px 20px;
}

.card{
background:#fff;
padding:10px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

/* PANIER */
.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:gold;
padding:15px;
border-radius:50%;
}

.cart{
position:fixed;
right:20px;
bottom:80px;
background:#fff;
padding:15px;
display:none;
width:300px;
}

.cart.active{display:block;}
</style>
</head>

<body>

<header>
<img src="https://i.postimg.cc/23JzWhPg/logo.png" alt="KANE Fashion">
<h2>KANE FASHION</h2>
</header>

<div class="products" id="products"></div>

<div class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div class="cart" id="cart">
<h3>Panier</h3>
<div id="cart-items"></div>
<p>Total: <span id="total">0</span></p>
</div>

<script>

/* PRODUITS */
const PRODUCTS = [

/* PARFUMS */
{name:"KANE Soft", price:10000, img:"https://i.postimg.cc/bN7N9G3r/telechargement-(7).jpg"},
{name:"KANE Fresh", price:12000, img:"https://i.postimg.cc/bN7N9G3r/telechargement-(7).jpg"},
{name:"KANE Floral", price:15000, img:"https://i.postimg.cc/bN7N9G3r/telechargement-(7).jpg"},
{name:"KANE Intense", price:18000, img:"https://i.postimg.cc/bN7N9G3r/telechargement-(7).jpg"},
{name:"KANE Nuit", price:20000, img:"https://i.postimg.cc/bN7N9G3r/telechargement-(7).jpg"},
{name:"KANE Gold", price:22000, img:"https://i.postimg.cc/bN7N9G3r/telechargement-(7).jpg"},
{name:"KANE Luxe", price:25000, img:"https://i.postimg.cc/bN7N9G3r/telechargement-(7).jpg"},

/* SACS */
{name:"Sac cuir noir", price:15000, img:"https://i.postimg.cc/mgrfMTGb/images-(2).jpg"},
{name:"Sac cuir marron", price:18000, img:"https://i.postimg.cc/mgrfMTGb/images-(2).jpg"},
{name:"Sac cuir luxe", price:20000, img:"https://i.postimg.cc/mgrfMTGb/images-(2).jpg"},
{name:"Sac main élégant", price:22000, img:"https://i.postimg.cc/mgrfMTGb/images-(2).jpg"},
{name:"Sac cuir simple", price:25000, img:"https://i.postimg.cc/G3SkrQht/telechargement-(8).jpg"},
{name:"Sac moderne", price:27000, img:"https://i.postimg.cc/G3SkrQht/telechargement-(8).jpgg"},
{name:"Sac fashion", price:28000, img:"https://i.postimg.cc/mgrfMTGb/images-(2).jpg"},
{name:"Sac chic", price:29000, img:"https://i.postimg.cc/placeholder7.jpg"},
{name:"Sac premium", price:30000, img:"https://i.postimg.cc/mgrfMTGb/images-(2).jpg"}

];

/* RENDER */
const container=document.getElementById("products");

PRODUCTS.forEach(p=>{
container.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price} FCFA</p>
<button onclick="add('${p.name}',${p.price})">Ajouter</button>
</div>`;
});

/* PANIER */
let cart=[];

function add(name,price){
let item=cart.find(i=>i.name===name);
if(item){item.qty++}
else{cart.push({name,price,qty:1})}
update();
}

function update(){
let html="";
let total=0;

cart.forEach(i=>{
total+=i.price*i.qty;
html+=`${i.name} x${i.qty}<br>`;
});

document.getElementById("cart-items").innerHTML=html;
document.getElementById("total").textContent=total;
document.getElementById("count").textContent=cart.length;
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}
function subscribeNewsletter(){
  const email = el('#newsletterEmail').value.trim();
  if(!email || !email.includes('@')){ alert('Entrer un email valide'); return; }
  if(NEWS.includes(email)){ showToast('Déjà inscrit'); return; }
  NEWS.push(email); write(KEY_NEWS, NEWS); showToast('✅ Inscription confirmée');
}
el('#openAuthBtn').addEventListener('click', ()=> { const u = getCurrentUser(); if(u) renderUserArea(); else openAuthModal(); });
el('#openSellerBtn').addEventListener('click', openSellerPanel);
el('#closeSellerBtn').addEventListener('click', closeSellerPanel);
el('#newProductBtn').addEventListener('click', newProductFlow);
el('#exportBtn').addEventListener('click', exportProducts);
el('#exportOrdersBtn').addEventListener('click', exportOrdersCSV);
el('#importBtn').addEventListener('click', ()=> el('#importFile').click());
el('#importFile').addEventListener('change', (e)=> { const f = e.target.files[0]; if(!f) return; const reader = new FileReader(); reader.onload = (ev)=>{ try{ const arr = JSON.parse(ev.target.result); if(!Array.isArray(arr)){ alert('Fichier invalide'); return; } PRODUCTS = arr; write(KEY_PRODUCTS, PRODUCTS); renderProducts(PRODUCTS); renderRecommendations(); renderSellerPanel(); showToast('✅ Import terminé'); } catch(err){ alert('Erreur import : ' + err.message); } }; reader.readAsText(f); e.target.value=''; });

if(localStorage.getItem('cookiesAccepted') === 'true'){ document.getElementById('cookie-banner').style.display='none'; }
el('#accept-cookies').addEventListener('click', ()=>{ localStorage.setItem('cookiesAccepted','true'); document.getElementById('cookie-banner').style.display='none'; });

el('#searchInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter') applySearch(); });
el('#deliveryZone').addEventListener('change', ()=> renderCart());
el('#closeSellerBtn').addEventListener('click', ()=> closeSellerPanel());

// initial render
renderProducts(PRODUCTS); renderRecommendations(); renderCart();

window.addEventListener('beforeunload', ()=> persistAll());

</script>

</body>
</html>
