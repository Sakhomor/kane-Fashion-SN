<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KANE Fashion</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5}

/* HEADER */
header{
    background:#000;color:#fff;text-align:center;padding:15px;
}

/* GRID */
.container{
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

/* CARD */
.card{
    background:#fff;border-radius:10px;overflow:hidden;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
}
.card img{width:100%;height:140px;object-fit:cover}
.card-content{padding:10px;text-align:center}
button{cursor:pointer}

/* PANIER */
.cart-btn{
    position:fixed;bottom:20px;right:20px;
    background:#000;color:#fff;padding:15px;border-radius:50%;
}
.cart{
    position:fixed;right:-350px;top:0;width:320px;height:100%;
    background:#fff;padding:15px;transition:0.3s;overflow:auto;
}
.cart.active{right:0}
.cart-item{border-bottom:1px solid #ddd;padding:10px 0}

/* ADMIN */
.admin{
    display:none;
    padding:20px;
    background:#fff;
}
input{padding:8px;margin:5px;width:90%}

/* BUTTONS */
.pay-btn{width:100%;padding:10px;margin-top:10px;border:none;color:#fff}
.wave{background:#00AEEF}
.orange{background:#FF6600}
.whatsapp{background:#25D366}
</style>
</head>

<body>

<header>
<h1>KANE Fashion</h1>
<button onclick="showShop()">Boutique</button>
<button onclick="showAdmin()">Admin</button>
</header>

<!-- SHOP -->
<div id="shop">
<div class="container" id="products"></div>
</div>

<!-- ADMIN -->
<div class="admin" id="admin">
<h2>Dashboard Admin</h2>

<input type="text" id="name" placeholder="Nom produit">
<input type="number" id="price" placeholder="Prix">
<input type="text" id="img" placeholder="URL image">

<button onclick="addProduct()">Ajouter produit</button>

<h3>Produits</h3>
<div id="admin-products"></div>

<h3>Commandes</h3>
<div id="orders"></div>
</div>

<!-- PANIER -->
<div class="cart" id="cart">
<h2>Panier</h2>
<div id="cart-items"></div>
<p>Total: <span id="total">0</span> FCFA</p>

<button class="pay-btn wave" onclick="pay('Wave')">Wave</button>
<button class="pay-btn orange" onclick="pay('Orange')">Orange Money</button>
<button class="pay-btn whatsapp" onclick="orderWhatsApp()">WhatsApp</button>
</div>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

<script>

// DATA
let products = JSON.parse(localStorage.getItem("products")) || [
    {name:"KANE Soft",price:10000,img:"https://via.placeholder.com/200"},
    {name:"Sac cuir noir",price:15000,img:"https://via.placeholder.com/200"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];

// AFFICHER PRODUITS
function displayProducts(){
    let html="";
    products.forEach((p,i)=>{
        html+=`
        <div class="card">
            <img src="${p.img}">
            <div class="card-content">
                <h3>${p.name}</h3>
                <p>${p.price} FCFA</p>
                <button onclick="addToCart(${i})">Ajouter</button>
            </div>
        </div>`;
    });
    document.getElementById("products").innerHTML=html;
}
displayProducts();

// PANIER
function addToCart(i){
    let item = cart.find(x=>x.name===products[i].name);
    if(item) item.qty++;
    else cart.push({...products[i],qty:1});
    saveCart();
    updateCart();
}

function updateCart(){
    let html="";let total=0;

    cart.forEach((item,i)=>{
        total+=item.price*item.qty;
        html+=`
        <div class="cart-item">
        ${item.name} x${item.qty} = ${item.price*item.qty}
        <br>
        <button onclick="changeQty(${i},1)">+</button>
        <button onclick="changeQty(${i},-1)">-</button>
        <button onclick="removeItem(${i})">❌</button>
        </div>`;
    });

    document.getElementById("cart-items").innerHTML=html;
    document.getElementById("total").innerText=total;
}

function changeQty(i,v){
    cart[i].qty+=v;
    if(cart[i].qty<=0) cart.splice(i,1);
    saveCart();updateCart();
}

function removeItem(i){
    cart.splice(i,1);
    saveCart();updateCart();
}

function saveCart(){
    localStorage.setItem("cart",JSON.stringify(cart));
}

// PANIER UI
function toggleCart(){
    document.getElementById("cart").classList.toggle("active");
}

// PAIEMENT
function pay(method){
    let total=document.getElementById("total").innerText;

    let order={cart,total,date:new Date().toLocaleString()};
    orders.push(order);
    localStorage.setItem("orders",JSON.stringify(orders));

    alert("Paiement "+method+"\nEnvoyer "+total+" FCFA au 70 962 57 18");
}

// WHATSAPP
function orderWhatsApp(){
    let msg="Commande:%0A";
    cart.forEach(i=>{
        msg+=`${i.name} x${i.qty} = ${i.price*i.qty} FCFA%0A`;
    });
    msg+="Total:"+document.getElementById("total").innerText;

    window.open("https://wa.me/221709625718?text="+msg);
}

// ADMIN
function showAdmin(){
    document.getElementById("shop").style.display="none";
    document.getElementById("admin").style.display="block";
    loadAdmin();
}

function showShop(){
    document.getElementById("shop").style.display="block";
    document.getElementById("admin").style.display="none";
}

// ADD PRODUCT
function addProduct(){
    let name=document.getElementById("name").value;
    let price=document.getElementById("price").value;
    let img=document.getElementById("img").value;

    products.push({name,price,img});
    localStorage.setItem("products",JSON.stringify(products));
    displayProducts();
    loadAdmin();
}

// ADMIN VIEW
function loadAdmin(){
    let html="";
    products.forEach((p,i)=>{
        html+=`${p.name} - ${p.price} 
        <button onclick="deleteProduct(${i})">❌</button><br>`;
    });
    document.getElementById("admin-products").innerHTML=html;

    let ordersHtml="";
    orders.forEach(o=>{
        ordersHtml+=`Commande ${o.total} FCFA - ${o.date}<br>`;
    });
    document.getElementById("orders").innerHTML=ordersHtml;
}

function deleteProduct(i){
    products.splice(i,1);
    localStorage.setItem("products",JSON.stringify(products));
    displayProducts();
    loadAdmin();
}

updateCart();

</script>

</body>
</html>
