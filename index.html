<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogue - KANE LUXURY</title>

<style>
:root{--gold:#D4AF37;}

body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

/* HEADER */
header{
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
}

.logo img{height:90px;}

nav a{
color:var(--gold);
margin:0 10px;
text-decoration:none;
}

/* CONTROLS */
.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:20px;
justify-content:center;
}

.controls input, .controls select{
padding:8px;
border:none;
border-radius:5px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:20px;
}

.card{
border:1px solid var(--gold);
padding:15px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px var(--gold);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h3{color:var(--gold);}

/* BUTTON */
button{
background:var(--gold);
border:none;
padding:8px 12px;
cursor:pointer;
}

/* PANIER */
.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:var(--gold);
color:#000;
padding:15px;
border-radius:50%;
cursor:pointer;
}

.cart{
position:fixed;
bottom:80px;
right:20px;
background:#111;
padding:15px;
width:260px;
display:none;
border:1px solid var(--gold);
}

.cart.active{display:block;}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
background:#111;
color:#aaa;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="https://www.image2url.com/r2/default/images/1776857636247-0a2140dc-2feb-402e-a1e8-8b2294630ffb.png">
</div>

<nav>
<a href="index.html">Accueil</a>
<a href="#">Catalogue</a>
<a href="#">Contact</a>
</nav>
</header>

<!-- CONTROLS -->
<div class="controls">
<input type="text" placeholder="Rechercher..." oninput="search(this.value)">

<select onchange="filterCat(this.value)">
<option value="all">Toutes catégories</option>
<option value="parfum">Parfums</option>
<option value="sac">Sacs</option>
</select>

<select onchange="sortPrice(this.value)">
<option value="default">Trier</option>
<option value="asc">Prix croissant</option>
<option value="desc">Prix décroissant</option>
</select>
</div>

<div class="products" id="products"></div>

<!-- PANIER -->
<div class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div class="cart" id="cart">
<h3>Panier</h3>
<div id="cart-items"></div>
<p>Total: <span id="total">0</span> FCFA</p>
<button onclick="order()">Commander</button>
</div>

<div class="footer">
Commande WhatsApp : +221 70 432 21 45
</div>

<script>

const PHONE="221704322145";

/* PRODUITS COMPLETS */
let PRODUCTS=[

{name:"KANE Soft",price:10000,cat:"parfum",img:"https://i.postimg.cc/vmHBcJ0v/telechargement-(5).jpg",desc:"Parfum doux"},
{name:"KANE Fresh",price:12000,cat:"parfum",img:"https://i.postimg.cc/prPKTG50/images.jpg",desc:"Fraîcheur intense"},
{name:"KANE Floral",price:15000,cat:"parfum",img:"https://i.postimg.cc/bN7N9G3r/telechargement-(7).jpg",desc:"Notes florales"},
{name:"KANE Gold",price:22000,cat:"parfum",img:"https://i.postimg.cc/prPKTG50/images.jpg",desc:"Luxe ultime"},

{name:"Sac cuir noir",price:15000,cat:"sac",img:"https://i.postimg.cc/mgrfMTGb/images-(2).jpg",desc:"Cuir noir"},
{name:"Sac cuir luxe",price:20000,cat:"sac",img:"https://i.postimg.cc/mgrfMTGb/images-(2).jpg",desc:"Premium"},
{name:"Sac chic",price:29000,cat:"sac",img:"https://i.postimg.cc/RhvbBTSm/telechargement-(9).jpg",desc:"Élégant"}
];

let filtered=[...PRODUCTS];
let cart=[];

/* RENDER */
function render(){
let html="";
filtered.forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<p>${p.price} FCFA</p>
<button onclick="add('${p.name}',${p.price})">Ajouter</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}
render();

/* SEARCH */
function search(q){
q=q.toLowerCase();
filtered=PRODUCTS.filter(p=>p.name.toLowerCase().includes(q));
render();
}

/* FILTER */
function filterCat(cat){
if(cat==="all") filtered=[...PRODUCTS];
else filtered=PRODUCTS.filter(p=>p.cat===cat);
render();
}

/* SORT */
function sortPrice(type){
if(type==="asc") filtered.sort((a,b)=>a.price-b.price);
if(type==="desc") filtered.sort((a,b)=>b.price-a.price);
render();
}

/* PANIER */
function add(name,price){
let item=cart.find(i=>i.name===name);
if(item){item.qty++}
else{cart.push({name,price,qty:1})}
updateCart();
}

function updateCart(){
let html="",total=0;
cart.forEach((i,index)=>{
total+=i.price*i.qty;
html+=`${i.name} x${i.qty}<br>`;
});
document.getElementById("cart-items").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("count").innerText=cart.length;
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

/* WHATSAPP */
function order(){
let msg="Commande:%0A";
cart.forEach(i=>msg+=i.name+" x"+i.qty+"%0A");
window.open(`https://wa.me/${PHONE}?text=${msg}`);
}

</script>

</body>
</html>
